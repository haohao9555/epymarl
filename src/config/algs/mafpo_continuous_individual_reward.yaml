# --- Continuous MAFPO/FPO with individual per-agent rewards ---

runner: "parallel"
mac: "fpo_mac"
agent: "fpo_actor"
learner: "fpo_continuous_learner"
critic_type: "fpo_critic"

# Keep each agent's reward separate instead of summing to a common team reward.
common_reward: False

# Collect independent environments in subprocesses under one training run.
batch_size_run: 8

# Keep enough complete episodes to cover roughly 2048 transitions, then clear
# the buffer after one on-policy train call.
buffer_size: 128
batch_size: 8
fpo_rollout_timesteps: 2048

# Each environment timestep stores this many fixed CFM neighbourhood points.
cfm_n_samples: 50
cfm_rho_clip: 3.0
cfm_target_type: "velocity"
cfm_reg_coef: 0.5

# Shuffle the collected rollout transitions and train for 10 passes.
fpo_minibatch_size: 256
epochs: 10

target_update_interval_or_tau: 0.01

lr: 0.0003
hidden_dim: 128

obs_agent_id: True
obs_last_action: False
obs_individual_obs: False

use_rnn: True
standardise_returns: False
standardise_rewards: True
q_nstep: 5
eps_clip: 0.2
name: "mafpo_continuous_individual_reward"

use_wandb: True
wandb_team: "adolf9555-university-of-technology-sydney"
wandb_project: "epymarl-mpe"
wandb_run_name: "MAFPO-MPE"
wandb_mode: "online"

t_max: 20050000
