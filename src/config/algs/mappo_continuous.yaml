# --- Continuous MAPPO parameters for Box(0, 1) action spaces ---

action_selector: "beta"
mask_before_softmax: False

runner: "parallel"

buffer_size: 10
batch_size_run: 10
batch_size: 10

target_update_interval_or_tau: 0.01

lr: 0.0003
hidden_dim: 128

obs_agent_id: True
obs_last_action: False
obs_individual_obs: False

mac: "continuous_mac"
agent: "rnn_continuous"
agent_output_type: "beta"
learner: "ppo_continuous_learner"
entropy_coef: 0.001
use_rnn: True
standardise_returns: False
standardise_rewards: True
q_nstep: 5
critic_type: "cv_critic"
epochs: 4
eps_clip: 0.2
name: "mappo_continuous"

use_wandb: True
wandb_team: "adolf9555-university-of-technology-sydney"
wandb_project: "epymarl-mpe"
wandb_mode: "online"

beta_param_epsilon: 0.0001
beta_action_epsilon: 0.000001

t_max: 20050000
